<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" type="text/css" href="./styles.css" />
</head>

<body>
    <div class="calculator-layout">
        <main class="calculator">
            <div class="calculator__screen">
                <input type="text" class="calculator__expression" value="" readonly />
                <input type="text" class="calculator__display" value="0" readonly />
            </div>

            <section class="calculator__buttons">

                <button class="calculator__button calculator__button--clear">C</button>
                <div class="calculator__button calculator__button--empty"></div>
                <div class="calculator__button calculator__button--empty"></div>
                <button class="calculator__button calculator__button--back">⌫</button>

                
                <button class="calculator__button calculator__button--number">7</button>
                <button class="calculator__button calculator__button--number">8</button>
                <button class="calculator__button calculator__button--number">9</button>
                <button class="calculator__button calculator__button--operator">-</button>
                
                <button class="calculator__button calculator__button--number">4</button>
                <button class="calculator__button calculator__button--number">5</button>
                <button class="calculator__button calculator__button--number">6</button>
                <button class="calculator__button calculator__button--operator">+</button>
                
                <button class="calculator__button calculator__button--number">1</button>
                <button class="calculator__button calculator__button--number">2</button>
                <button class="calculator__button calculator__button--number">3</button>
                <button class="calculator__button calculator__button--operator">/</button>
                
                <button class="calculator__button calculator__button--number">0</button>
                <button class="calculator__button calculator__button--number">.</button>
                <button class="calculator__button calculator__button--equal">=</button>
                <button class="calculator__button calculator__button--operator">*</button>

            </section>
        </main>

        <aside class="calculator__history">
            <h2 class="calculator__history-title">History</h2>
            <ul class="calculator__histories"></ul>
        </aside>
    </div>
    <script type="module">
        import { App } from './ui.js'
        new App();
    </script>
</body>

</html>
