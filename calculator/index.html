<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Calculator</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f5;
            font-family: Arial, sans-serif;
            padding: 24px;
        }

        .calculator-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .calculator {
            width: 320px;
            background-color: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .calculator__screen {
            background-color: #18181b;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
        }

        .calculator__expression {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: #a1a1aa;
            text-align: right;
            font-size: 16px;
        }

        .calculator__display {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 32px;
            text-align: right;
            padding-top: 8px;
        }

        .calculator__buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calculator__button {
            border: none;
            height: 60px;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .calculator__button:hover {
            opacity: 0.9;
        }

        .calculator__button--number {
            background-color: #f4f4f5;
        }

        .calculator__button--operator {
            background-color: #18181b;
            color: white;
        }

        .calculator__button--equal {
            background-color: #2563eb;
            color: white;
        }

        .calculator__button--clear {
            background-color: #dc2626;
            color: white;
        }

        .calculator__history {
            width: 240px;
            background-color: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .calculator__history-title {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .calculator__histories {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 320px;
            overflow: auto;
        }

        .calculator__history-item {
            background-color: #f4f4f5;
            padding: 12px;
            border-radius: 8px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="calculator-layout">
        <main class="calculator">
            <div class="calculator__screen">
                <input type="text" class="calculator__expression" value="" readonly />
                <input type="text" class="calculator__display" value="0" readonly />
            </div>

            <section class="calculator__buttons">

                <button class="calculator__button calculator__button--clear">C</button>
                <div class="calculator__button calculator__button--empty"></div>
                <div class="calculator__button calculator__button--empty"></div>
                <button class="calculator__button calculator__button--back">⌫</button>

                
                <button class="calculator__button calculator__button--number">7</button>
                <button class="calculator__button calculator__button--number">8</button>
                <button class="calculator__button calculator__button--number">9</button>
                <button class="calculator__button calculator__button--operator">-</button>
                
                <button class="calculator__button calculator__button--number">4</button>
                <button class="calculator__button calculator__button--number">5</button>
                <button class="calculator__button calculator__button--number">6</button>
                <button class="calculator__button calculator__button--operator">+</button>
                
                <button class="calculator__button calculator__button--number">1</button>
                <button class="calculator__button calculator__button--number">2</button>
                <button class="calculator__button calculator__button--number">3</button>
                <button class="calculator__button calculator__button--operator">/</button>
                
                <button class="calculator__button calculator__button--number">0</button>
                <button class="calculator__button calculator__button--number">.</button>
                <button class="calculator__button calculator__button--equal">=</button>
                <button class="calculator__button calculator__button--operator">*</button>

            </section>
        </main>

        <aside class="calculator__history">
            <h2 class="calculator__history-title">History</h2>
            <ul class="calculator__histories"></ul>
        </aside>
    </div>
    <script type="module">
        import { App } from './app.js'
        new App();
    </script>
</body>

</html>
