<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <link rel="stylesheet" type="text/css" href="./styles.css" />

</head>

<body>
    <div class="todo">

        <header class="todo__header">
            <h1 class="todo__title">Task List</h1>
        </header>

        <!-- Input -->
        <section class="todo__input-area">
            <input class="todo__input" type="text" placeholder="Add a task..." />
            <button class="todo__button todo__button--add">Add</button>
        </section>

        <!-- Filters -->
        <section class="todo__filters">
            <button data-status="" class="todo__filter todo__filter--active">All</button>
            <button data-status="active" class="todo__filter">Active</button>
            <button data-status="completed" class="todo__filter">Completed</button>
        </section>

        <!-- List -->
        <section class="todo__list-area">
            <ul class="todo__list">



            </ul>
        </section>

    </div>
    <script type="module">
        import { TodoApp } from './todo-app.js'
        const app = new TodoApp()
    </script>
</body>

</html>
