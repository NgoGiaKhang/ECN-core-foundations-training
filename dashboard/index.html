<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Dashboard</title>

    <style>
        :root {
            --bg: #ffffff;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --muted: #64748b;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            font-family: system-ui;
        }

        body {
            margin: 0;
            background: #f8fafc;
            /* shadcn light background */
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .grid {
            width: 420px;
            display: grid;
            gap: 12px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 14px;
            min-height: 70px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .title {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .error {
            color: var(--error);
            font-size: 14px;
        }

        /* skeleton (shadcn light style) */
        .skeleton {
            height: 14px;
            border-radius: 6px;
            background: linear-gradient(90deg,
                    #f1f5f9 25%,
                    #e2e8f0 37%,
                    #f1f5f9 63%);
            background-size: 400% 100%;
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: 0 0;
            }
        }

        button {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--text);
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #f1f5f9;
        }
    </style>
</head>

<body>

    <div class="grid">

        <div class="card">
            <div class="title">Bitcoin Price</div>
            <div id="btc" class="value">
                <div class="skeleton"></div>
            </div>
        </div>

        <div class="card">
            <div class="title">Random Joke</div>
            <div id="joke" class="value">
                <div class="skeleton"></div>
            </div>
        </div>

        <div class="card">
            <div class="title">Advice</div>
            <div id="advice" class="value">
                <div class="skeleton"></div>
            </div>
        </div>

        <button id="refresh">Refresh</button>

    </div>

    <script type="module">
        import { App } from "./app.js"
        new App();
    </script>

</body>

</html>
